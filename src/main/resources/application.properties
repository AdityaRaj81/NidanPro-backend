spring.application.name=backend

# PORT (IMPORTANT for Render)
server.port=${PORT:8080}

# DATABASE
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Security and JWT
jwt.secret=${JWT_SECRET:change-this-secret-key-to-a-very-long-random-value-32-bytes-minimum}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

# Seed super-admin account (optional, set via environment variables)
app.seed.super-admin.email=${SUPER_ADMIN_EMAIL:}
app.seed.super-admin.password=${SUPER_ADMIN_PASSWORD:}
app.seed.super-admin.name=${SUPER_ADMIN_NAME:Super Admin}

# OTP behavior (fixed OTP while OTP service is disabled)
app.patient-auth.default-otp=${APP_PATIENT_AUTH_DEFAULT_OTP:86510}
