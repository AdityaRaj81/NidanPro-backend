services:
  - type: web
    name: nidanpro-backend
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://nidanpro.netlify.app
      # Set these 3 in the Render Dashboard (Environment tab) — do NOT commit credentials to git:
      # DB_URL     = jdbc:postgresql://ep-dry-mode-aoh9wexp-pooler.c-2.ap-southeast-1.aws.neon.tech/nidanpro_DB?sslmode=require
      # DB_USERNAME = neondb_owner
      # DB_PASSWORD = <your neon password>
      # JWT_SECRET  = <any random 32+ char string>